  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script> // loading animation
  'use strict';
  (function () {
    const canvas = document.getElementById('loading-canvas');
    const ctx    = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    const W = canvas.width, H = canvas.height;

    const SP   = 6;
    const COLS = Math.ceil(W / SP) + 2;
    const ROWS = Math.ceil(H / SP) + 2;
    const N    = COLS * ROWS;
    const DR   = 0.76;
    const BASE = 0.08;

    const GX = (W - COLS * SP) * 0.5;
    const GY = (H - ROWS * SP) * 0.5;

    const bright = new Float32Array(N).fill(BASE);
    const locked = new Uint8Array(N);
    const zone   = new Uint8Array(N);

    // Pre-compute dot positions — avoids per-frame array allocations
    const dotX = new Float32Array(N);
    const dotY = new Float32Array(N);
    for (let i = 0; i < N; i++) {
      dotX[i] = GX + (i % COLS) * SP + SP * 0.5;
      dotY[i] = GY + ((i / COLS) | 0) * SP + SP * 0.5;
    }

    const CX  = (COLS - 1) * 0.5;
    const CY  = (ROWS - 1) * 0.5;
    const NP  = 12;
    const ROT = -Math.PI * 0.5;

    function starEdge(ang, R, r) {
      const sec  = (Math.PI * 2) / NP;
      const a    = ((ang - ROT) % sec + sec) % sec;
      const half = sec * 0.5;
      const t    = Math.min(a, sec - a) / half;
      return r + (R - r) * (1 - t);
    }
    const inStar = (dx, dy, R, r) =>
      Math.hypot(dx, dy) <= starEdge(Math.atan2(dy, dx), R, r);

    for (let i = 0; i < N; i++) {
      const dx = (i % COLS) - CX;
      const dy = ((i / COLS) | 0) - CY;
      if      (inStar(dx, dy, 13.5, 10))   zone[i] = 3;
      else if (inStar(dx, dy, 17.5, 11.5)) zone[i] = 2;
      else if (inStar(dx, dy, 22.5, 14))   zone[i] = 1;
    }

    const ZC = [null, [218, 62, 48], [58, 80, 212], [228, 172, 52]];
    const rc = (r, g, b, a) => `rgba(${r},${g},${b},${a})`;
    const zc = (z, a)       => rc(...ZC[z], a);

    const starDots = [];
    for (let i = 0; i < N; i++) {
      if (!zone[i]) continue;
      const dx = (i % COLS) - CX;
      const dy = ((i / COLS) | 0) - CY;
      starDots.push({ i, dist: Math.hypot(dx, dy) });
    }
    starDots.sort((a, b) => a.dist - b.dist);
    const TOTAL = starDots.length;

    const ZB = [0, 0.36, 0.44, 0.55];

    // Lightweight tween pool — replaces per-dot GSAP instances
    // Each entry: [dotIndex, fromVal, peakVal, targetVal, riseDur, settleDur, elapsed, phase]
    const TW_I=0, TW_FROM=1, TW_PEAK=2, TW_TARGET=3, TW_RISE=4, TW_SETTLE=5, TW_T=6, TW_PHASE=7;
    const tweens = [];

    function updateTweens(dt) {
      for (let j = tweens.length - 1; j >= 0; j--) {
        const tw = tweens[j];
        tw[TW_T] += dt;
        if (tw[TW_PHASE] === 0) {
          const t = Math.min(1, tw[TW_T] / tw[TW_RISE]);
          const e = 1 - (1 - t) * (1 - t) * (1 - t); // power3 out
          bright[tw[TW_I]] = tw[TW_FROM] + (tw[TW_PEAK] - tw[TW_FROM]) * e;
          if (t >= 1) { tw[TW_PHASE] = 1; tw[TW_T] = 0; }
        } else {
          const t = Math.min(1, tw[TW_T] / tw[TW_SETTLE]);
          const e = 0.5 - 0.5 * Math.cos(t * Math.PI); // sine inOut
          bright[tw[TW_I]] = tw[TW_PEAK] + (tw[TW_TARGET] - tw[TW_PEAK]) * e;
          if (t >= 1) {
            bright[tw[TW_I]] = tw[TW_TARGET];
            locked[tw[TW_I]] = 0;
            tweens[j] = tweens[tweens.length - 1];
            tweens.pop();
          }
        }
      }
    }

    function lightDot(i) {
      if (locked[i]) return;
      locked[i] = 1;
      const target = ZB[zone[i]];
      tweens.push([i, bright[i], target * 1.6, target,
        0.07 + Math.random() * 0.06, 0.2 + Math.random() * 0.18, 0, 0]);
    }

    const counter = { value: 0 };
    let lastLit   = 0;
    const lp      = { p: 0 };
    const LOAD_START = Date.now();
    const MIN_DISPLAY = 4100;

    function startLoad() {
      lastLit       = 0;
      lp.p          = 0;
      counter.value = 0;
      for (let i = 0; i < N; i++) {
        if (zone[i]) { bright[i] = BASE * 0.35; locked[i] = 0; }
      }

      gsap.to(counter, {
        value: 99,
        duration: 4,
        ease: 'power4.out',
        snap: { value: 1 }
      });

      gsap.to(lp, {
        p: TOTAL,
        duration: 4,
        ease: 'power4.out',
        onUpdate() {
          const tgt = Math.round(lp.p);
          while (lastLit < tgt) lightDot(starDots[lastLit++].i);
        }
      });
    }

    let rafId = null;

    window._completeLoading = function () {
      const elapsed = Date.now() - LOAD_START;
      const wait    = Math.max(0, MIN_DISPLAY - elapsed);
      setTimeout(function () {
        gsap.killTweensOf(counter);
        gsap.killTweensOf(lp);
        gsap.to(counter, {
          value: 100,
          duration: 0.32,
          ease: 'power2.in',
          snap: { value: 1 }
        });
        gsap.to(lp, {
          p: TOTAL,
          duration: 0.32,
          ease: 'power2.in',
          onUpdate() {
            const tgt = Math.round(lp.p);
            while (lastLit < tgt) lightDot(starDots[lastLit++].i);
          },
          onComplete() {
            var loading = document.querySelector('.loading');
            gsap.to(loading, {
              opacity: 0,
              duration: 0.45,
              delay: 0.12,
              ease: 'power1.inOut',
              onComplete() {
                cancelAnimationFrame(rafId);
                rafId = null;
                tweens.length = 0;
                canvas.width = 0;
                loading.remove();
                delete window._completeLoading;
              }
            });
          }
        });
      }, wait);
    };

    startLoad();

    const LOAD_FRAME_MS = 1000 / 12;
    let lastTime = -1;
    function render(now) {
      rafId = requestAnimationFrame(render);
      if (lastTime < 0) { lastTime = now; }
      const elapsed = now - lastTime;
      if (elapsed < LOAD_FRAME_MS) return;
      const dt = Math.min(elapsed / 1000, 0.1);
      lastTime = now - (elapsed % LOAD_FRAME_MS);

      updateTweens(dt);

      ctx.clearRect(0, 0, W, H);

      ctx.globalCompositeOperation = 'source-over';
      for (let z = 1; z <= 3; z++) {
        ctx.fillStyle = zc(z, 0.055);
        ctx.beginPath();
        for (let i = 0; i < N; i++) {
          if (zone[i] === z && bright[i] < 0.15) {
            const x = dotX[i], y = dotY[i];
            ctx.moveTo(x + DR, y);
            ctx.arc(x, y, DR, 0, Math.PI * 2);
          }
        }
        ctx.fill();
      }

      ctx.globalCompositeOperation = 'lighter';
      for (let i = 0; i < N; i++) {
        const b = bright[i];
        if (b < 0.15) continue;
        const x = dotX[i], y = dotY[i];
        const gR  = DR * 1.5 + b * 5.8;
        const grd = ctx.createRadialGradient(x, y, 0, x, y, gR);
        const z   = zone[i];
        if (!z) continue;
        const [r, g, bl] = ZC[z];
        grd.addColorStop(0,    rc(r, g, bl, b * 0.28));
        grd.addColorStop(0.3,  rc(r, g, bl, b * 0.12));
        grd.addColorStop(0.65, rc(r, g, bl, b * 0.038));
        grd.addColorStop(1,    rc(r, g, bl, 0));
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(x, y, gR, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalCompositeOperation = 'source-over';
      for (let i = 0; i < N; i++) {
        const b = bright[i];
        if (b < 0.15) continue;
        const x = dotX[i], y = dotY[i];
        const z = zone[i];
        if (!z) continue;
        const [r, g, bl] = ZC[z];
        ctx.fillStyle = rc(r, g, bl, Math.min(1, b * 1.1));
        ctx.beginPath();
        ctx.arc(x, y, DR * (1.05 + b * 0.36), 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalCompositeOperation = 'source-over';
      ctx.font         = '400 62px "Urbanist", sans-serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle    = 'rgba(238,228,208,0.86)';
      const cv = Math.round(counter.value);
      ctx.fillText(
        cv < 100 ? String(cv).padStart(2, '0') : '100',
        W * 0.5,
        H * 0.5 + 22.5 * SP + 76
      );
    }

    rafId = requestAnimationFrame(render);
  })();
  </script>
